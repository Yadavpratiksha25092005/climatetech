name: climatetech_frontend
description: Climate Tech — climate action platform (Flutter Web frontend)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.19.0
  fl_chart: ^0.69.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1

  # Routing
  go_router: ^14.2.0

  # Local storage (JWT tokens)
  shared_preferences: ^2.2.3

  # Forms & validation helpers
  formz: ^0.7.0

  # UI
  google_fonts: ^6.2.1

  # PDF report download
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # Marketplace photo picking + upload
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon_cropped.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
